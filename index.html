<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 語音文本自動配對工具</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script src="https://unpkg.com/string-similarity@4.0.2/dist/string-similarity.min.js"></script>
</head>
<body>

<div class="container">
    <header>
        <h1>🎮 語音文本自動配對工具</h1>
        <p>專為本地化與開發者設計，純瀏覽器運算，隱私無虞。</p>
    </header>

    <main class="card">
        <section class="upload-section">
            <div class="form-group">
                <label>1. 上傳文本表 (CSV)</label>
                <div class="file-input-wrapper">
                    <input type="file" id="csvFile" accept=".csv">
                </div>
                <small>程式會讀取 CSV 的第一欄作為比對基準。</small>
            </div>

            <div class="form-group">
                <label>2. 上傳語音包 (ZIP)</label>
                <div class="file-input-wrapper">
                    <input type="file" id="zipFile" accept=".zip">
                </div>
                <small>請確保音檔格式為 .wav 或 .mp3。</small>
            </div>
        </section>

        <section class="action-section">
            <button id="startBtn" class="btn-primary">開始 AI 匹配任務</button>
        </section>

        <section id="statusContainer" class="status-container">
            <div id="statusHeader">等待操作中...</div>
            <div id="progressWrapper" class="progress-wrapper" style="display:none;">
                <div id="progressBar" class="progress-bar"></div>
            </div>
            <div id="statusLog" class="status-log"></div>
        </section>

        <section id="resultSection" class="result-section"></section>
    </main>

    <footer>
        <p>首次執行將下載 whisper-base 模型 (140MB)，下載後將存於瀏覽器快取中。</p>
    </footer>
</div>

<script type="module" src="app.js"></script>
</body>
</html>
