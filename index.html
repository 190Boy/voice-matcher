<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 語音自動配對工具 - 專業版</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎮</text></svg>">
    
    <style>
        :root {
            --neon-green: #00ffcc;
            --bg-dark: #0d1117;
            --card-bg: rgba(22, 27, 34, 0.8);
        }

        body {
            font-family: 'Segoe UI', Microsoft JhengHei, sans-serif;
            background-color: var(--bg-dark);
            color: #e6edf3;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 800px;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 15px;
            border: 1px solid var(--neon-green);
            box-shadow: 0 0 20px rgba(0, 255, 204, 0.2);
            backdrop-filter: blur(10px);
        }

        h1 {
            color: var(--neon-green);
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(0, 255, 204, 0.5);
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 10px;
            font-weight: bold;
            color: var(--neon-green);
        }

        /* 工作模式區塊 */
        .mode-container {
            background: rgba(0, 0, 0, 0.4);
            padding: 20px;
            border-radius: 8px;
            border: 1px solid rgba(0, 255, 204, 0.3);
            margin-bottom: 20px;
        }

        .mode-option {
            cursor: pointer;
            color: #fff;
            display: block;
            margin-bottom: 12px;
            padding: 5px;
            transition: 0.3s;
        }

        .mode-option:hover {
            background: rgba(0, 255, 204, 0.1);
        }

        input[type="radio"] {
            accent-color: var(--neon-green);
            transform: scale(1.2);
            margin-right: 10px;
        }

        /* 下拉選單樣式 */
        select {
            width: 100%;
            padding: 12px;
            background: rgba(0, 0, 0, 0.6);
            color: var(--neon-green);
            border: 1px solid var(--neon-green);
            border-radius: 8px;
            font-size: 16px;
            outline: none;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(0, 255, 204, 0.1);
        }

        /* 檔案上傳外框 */
        .file-input-wrapper {
            border: 2px dashed rgba(0, 255, 204, 0.3);
            padding: 20px;
            text-align: center;
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.2);
            transition: 0.3s;
        }

        .file-input-wrapper:hover {
            border-color: var(--neon-green);
            background: rgba(0, 255, 204, 0.05);
        }

        input[type="file"] {
            color: #8b949e;
        }

        button {
            width: 100%;
            padding: 15px;
            background: transparent;
            color: var(--neon-green);
            border: 2px solid var(--neon-green);
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        button:hover:not(:disabled) {
            background: var(--neon-green);
            color: #000;
            box-shadow: 0 0 20px var(--neon-green);
        }

        button:disabled {
            border-color: #484f58;
            color: #484f58;
            cursor: not-allowed;
        }

        /* 進度條與狀態 */
        #statusHeader {
            margin-top: 30px;
            text-align: center;
            font-weight: bold;
        }

        #progressWrapper {
            display: none;
            height: 10px;
            background: #161b22;
            border-radius: 5px;
            margin: 20px 0;
            overflow: hidden;
            border: 1px solid #30363d;
        }

        #progressBar {
            width: 0%;
            height: 100%;
            background: var(--neon-green);
            box-shadow: 0 0 10px var(--neon-green);
            transition: width 0.3s;
        }

        #statusLog {
            height: 150px;
            background: #010409;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 10px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            overflow-y: auto;
            color: #7d8590;
        }

        .btn-success {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 24px;
            background: var(--neon-green);
            color: #000;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎙️ AI Audio Lab</h1>

        <div class="form-group">
            <label>1. 選擇工作模式</label>
            <div class="mode-container">
                <label class="mode-option">
                    <input type="radio" name="workMode" value="modeA" id="modeA"> 
                    <strong>A. 純語音轉文字</strong> <span style="color: #8b949e; font-size: 0.9em;">(僅輸出檔名與繁體文字)</span>
                </label>
                <label class="mode-option">
                    <input type="radio" name="workMode" value="modeB" id="modeB" checked> 
                    <strong>B. 語音轉文字 + 文本比對</strong> <span style="color: #8b949e; font-size: 0.9em;">(需上傳對照 CSV)</span>
                </label>
            </div>
        </div>

        <div class="form-group">
            <label>2. 選擇 AI 語音模型</label>
            <select id="modelSelect">
                <option value="Xenova/whisper-tiny">Whisper-Tiny (約 40 MB) - 極速優先</option>
                <option value="Xenova/whisper-base" selected>Whisper-Base (約 140 MB) - 速度與精準平衡</option>
                <option value="Xenova/whisper-small">Whisper-Small (約 500 MB) - 高精準度</option>
                <option value="Xenova/whisper-large-v2">Whisper-Large (約 3 GB) - 極限精準 (耗能)</option>
            </select>
        </div>

        <div class="form-group" id="csvUploadBlock">
            <label>3. 上傳遊戲台詞文本 (CSV 格式)</label>
            <div class="file-input-wrapper">
                <input type="file" id="csvFile" accept=".csv">
            </div>
            <p style="font-size: 0.8em; color: #8b949e; margin-top: 5px;">* 系統將自動抓取 CSV 的第一欄作為比對文本。</p>
        </div>

        <div class="form-group">
            <label>4. 選擇語音資料夾 (免壓縮直接讀取)</label>
            <div class="file-input-wrapper">
                <input type="file" id="folderFile" webkitdirectory directory multiple>
            </div>
        </div>

        <button id="startBtn">⚡ 開始 AI 匹配任務</button>

        <h3 id="statusHeader">等待操作中...</h3>
        
        <div id="progressWrapper">
            <div id="progressBar"></div>
        </div>

        <div id="statusLog"></div>

        <div id="resultSection" style="text-align: center;"></div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
