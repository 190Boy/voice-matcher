<div class="form-group">
    <label>1. 選擇工作模式</label>
    <div style="margin-bottom: 15px; background: #f8f9fa; padding: 10px; border-radius: 5px;">
        <label style="cursor: pointer; margin-right: 15px;">
            <input type="radio" name="workMode" value="modeA" id="modeA"> 
            <strong>A. 純語音轉文字</strong> (僅輸出檔名與繁體文字)
        </label>
        <br>
        <label style="cursor: pointer;">
            <input type="radio" name="workMode" value="modeB" id="modeB" checked> 
            <strong>B. 語音轉文字 + 文本比對</strong> (需上傳對照 CSV)
        </label>
    </div>
</div>

<div class="form-group">
    <label>2. 選擇 AI 語音模型</label>
    <select id="modelSelect" style="width: 100%; padding: 8px; border-radius: 4px; border: 1px solid #ccc; margin-bottom: 15px;">
        <option value="Xenova/whisper-tiny">Whisper-Tiny (約 40 MB) - 極速，但較易有錯字</option>
        <option value="Xenova/whisper-base" selected>Whisper-Base (約 140 MB) - 速度與精準度平衡</option>
        <option value="Xenova/whisper-small">Whisper-Small (約 500 MB) - 高精準度，速度較慢</option>
        <option value="Xenova/whisper-large-v2">Whisper-Large (約 3 GB) - 極限精準，極度消耗效能與網路</option>
    </select>
</div>

<div class="form-group" id="csvUploadBlock">
    <label>3. 上傳遊戲台詞文本 (CSV 格式)</label>
    <div class="file-input-wrapper">
        <input type="file" id="csvFile" accept=".csv">
    </div>
    <small>請確保第一欄為文本台詞。</small>
</div>

<div class="form-group">
    <label>4. 選擇語音資料夾 (免壓縮直接讀取)</label>
    <div class="file-input-wrapper">
        <input type="file" id="folderFile" webkitdirectory directory multiple>
    </div>
</div>
